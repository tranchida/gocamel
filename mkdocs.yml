site_name: "GoCamel"
site_url: https://tranchida.github.io/gocamel/
repo_url: https://github.com/tranchida/gocamel
repo_name: tranchida/gocamel

copyright: Copyright &copy; 2026 GoCamel

theme:
  name: material
  palette:
    # Mode clair
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Passer au mode sombre
    # Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Passer au mode clair
  
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    
  icon:
    repo: fontawesome/brands/github
    
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tranchida/gocamel
      
  generator: false

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - attr_list
  - md_in_html
  - abbr

nav:
  - Accueil: 
    - index.md
    - Fonctionnalités: features.md
    - Quick Start: quickstart.md
  - Documentation:
    - Concepts: concepts.md
    - Architecture: architecture.md
    - Composants: components.md
    - EIP (Patterns): eip.md
    - Simple Language: simple-language.md
  - Guide:
    - Installation: installation.md
    - Configuration: configuration.md
    - Exemples: examples.md
  - Référence API: reference.md
  - Changelog: changelog.md

extra_css:
  - stylesheets/extra.css
