site_name: GoCamel
site_url: https://tranchida.github.io/gocamel/
repo_url: https://github.com/tranchida/gocamel
repo_name: tranchida/gocamel

copyright: Copyright &copy; 2026 GoCamel

theme:
  name: material
  
  # Language
  language: en
  
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tranchida/gocamel
  generator: false

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - attr_list
  - md_in_html

# Navigation - English (default)
nav:
  - Home: index.md
  - Features: en/features.md
  - Quick Start: en/quickstart.md
  - Documentation:
    - Concepts: en/concepts.md
    - Architecture: en/architecture.md
    - Components: en/components.md
    - EIP Patterns: en/eip.md
    - Simple Language: en/simple-language.md
  - Guide:
    - Installation: en/installation.md
    - Configuration: en/configuration.md
    - Examples: en/examples.md
  - API Reference: en/reference.md
  - Changelog: en/changelog.md
