site_name: GoCamel
site_url: https://tranchida.github.io/gocamel/fr/
site_dir: site/fr
repo_url: https://github.com/tranchida/gocamel
repo_name: tranchida/gocamel

copyright: Copyright &copy; 2026 GoCamel

theme:
  name: material
  language: fr
  
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Passer au mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Passer au mode clair
  
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tranchida/gocamel
  generator: false
  
plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - attr_list
  - md_in_html

# Navigation - Français
nav:
  - Accueil: 
    - fr/index.md
    - Fonctionnalités: fr/features.md
    - Démarrage Rapide: fr/quickstart.md
  - Documentation:
    - Concepts: fr/concepts.md
    - Architecture: fr/architecture.md
    - Composants: fr/components.md
    - Patterns EIP: fr/eip.md
    - Simple Language: fr/simple-language.md
  - Guide:
    - Installation: fr/installation.md
    - Configuration: fr/configuration.md
    - Exemples: fr/examples.md
  - Référence API: fr/reference.md
  - Changelog: fr/changelog.md
